    <rect x="50" y="35" width="12" height="10" rx="2" fill="#6366f1" opacity="0.5"/>
    <path d="M53 35 V30 C53 26 59 26 59 30 V35" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <circle cx="56" cy="40" r="1.5" fill="#0c0821"/>
  </g>
