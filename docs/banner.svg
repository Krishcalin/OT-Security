    <rect x="74" y="0" width="66" height="22" rx="5" fill="rgba(129,140,248,0.06)" stroke="#818cf8" stroke-width="0.6"/>
    <text x="107" y="15" font-family="monospace" font-size="8.5" fill="#818cf8" text-anchor="middle">GDPR</text>
    <rect x="148" y="0" width="80" height="22" rx="5" fill="rgba(79,70,229,0.06)" stroke="#4f46e5" stroke-width="0.6"/>
    <text x="188" y="15" font-family="monospace" font-size="8.5" fill="#4f46e5" text-anchor="middle">ISO 27001</text>
    <rect x="236" y="0" width="80" height="22" rx="5" fill="rgba(99,102,241,0.06)" stroke="#6366f1" stroke-width="0.6"/>
    <text x="276" y="15" font-family="monospace" font-size="8.5" fill="#6366f1" text-anchor="middle">SOC 2</text>
