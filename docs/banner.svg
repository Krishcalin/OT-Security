    <!-- Cart / procurement icon -->
    <path d="M34 50 L40 50 L50 80 L72 80 L78 58 L44 58" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <circle cx="52" cy="88" r="3" fill="#6366f1" opacity="0.6"/>
    <circle cx="68" cy="88" r="3" fill="#6366f1" opacity="0.6"/>
    <!-- Checkmark on shield -->
    <path d="M48 100 L54 106 L66 92" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
